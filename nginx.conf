events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;
    keepalive_timeout 65;

    # Rate limiting por IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    upstream postsocial {
        server web:5000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name postay.com.br www.postay.com.br;

        # Validação Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://postay.com.br$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name postay.com.br www.postay.com.br;

        ssl_certificate     /etc/letsencrypt/live/postay.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/postay.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # www → sem www
        if ($host = www.postay.com.br) {
            return 301 https://postay.com.br$request_uri;
        }

        # Headers de segurança
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        location / {
            proxy_pass http://postsocial;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # Rate limit no login
        location /login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://postsocial;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Bloquear arquivos sensíveis
        location ~ /\.(env|git|htaccess) {
            deny all;
        }
    }
}
