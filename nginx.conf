events { worker_connections 1024; }

http {
    client_max_body_size 50M;
    keepalive_timeout 65;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    upstream flask  { server web:5000; }
    upstream nextjs { server nextjs:3000; }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name postay.com.br www.postay.com.br;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://postay.com.br$request_uri; }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name postay.com.br www.postay.com.br;

        ssl_certificate     /etc/letsencrypt/live/postay.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/postay.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        if ($host = www.postay.com.br) { return 301 https://postay.com.br$request_uri; }

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # ── Flask: APIs, uploads, rotas Jinja ainda ativas ────────
        location /api/ {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }
        location /uploads/ {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
        location /static/ {
            proxy_pass http://flask;
            proxy_set_header Host $host;
            expires 30d;
        }
        location /health      { proxy_pass http://flask; }
        location /robots.txt  { proxy_pass http://flask; }
        location /sitemap.xml { proxy_pass http://flask; }
        location /admin       { proxy_pass http://flask; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
        location /pagamento/  { proxy_pass http://flask; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
        location /tiktok/     { proxy_pass http://flask; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
        location /logout      { proxy_pass http://flask; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }
        location /cadastro    { proxy_pass http://flask; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto https; }

        location /login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://flask;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Next.js: landing (/) + dashboard (/dashboard) ─────────
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location ~ /\.(env|git|htaccess) { deny all; }
    }
}
