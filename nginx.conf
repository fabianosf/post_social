server {
    listen 80;
    listen [::]:80;
    server_name postay.com.br www.postay.com.br;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name postay.com.br www.postay.com.br;

    ssl_certificate /etc/letsencrypt/live/postay.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postay.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location = /tiktok.txt {
        alias /home/fabianosf/post_social/deploy/tiktok.txt;
        default_type text/plain;
        charset utf-8;
    }

    location /api/        { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; proxy_read_timeout 120s; }
    location /uploads/    { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; expires 7d; }
    location /static/     { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; expires 30d; }
    location /health      { proxy_pass http://127.0.0.1:8095; }
    location /robots.txt  { proxy_pass http://127.0.0.1:8095; }
    location /sitemap.xml { proxy_pass http://127.0.0.1:8095; }
    location /admin       { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /pagamento/  { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /tiktok/     {
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://sdk.mercadopago.com https://www.tiktok.com https://accounts.tiktok.com https://sf-security.ibytedtos.com https://*.tiktokcdn.com https://*.ttwstatic.com https://mon.tiktokv.com; script-src-elem 'self' 'unsafe-inline' https://sdk.mercadopago.com https://www.tiktok.com https://accounts.tiktok.com https://sf-security.ibytedtos.com https://*.tiktokcdn.com https://*.ttwstatic.com https://mon.tiktokv.com; style-src 'self' 'unsafe-inline' https://*.ttwstatic.com https://*.tiktokcdn.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.mercadopago.com https://open.tiktokapis.com https://www.tiktok.com https://accounts.tiktok.com https://sf-security.ibytedtos.com https://*.tiktokcdn.com https://*.ttwstatic.com https://mon.tiktokv.com; frame-src https://www.mercadopago.com.br https://mercadopago.com.br https://www.tiktok.com https://accounts.tiktok.com https://sf-security.ibytedtos.com https://*.tiktokcdn.com https://*.ttwstatic.com; worker-src 'self' blob: https://*.ttwstatic.com https://*.tiktokcdn.com; form-action 'self' https://www.tiktok.com https://accounts.tiktok.com; object-src 'none'; base-uri 'self';" always;
        proxy_pass http://127.0.0.1:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
    location /logout      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /cadastro    { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /login       { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /ai          { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /analytics   { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /automacoes  { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /automations { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /recommendations { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /stats       { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /upload      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /selecionar-conta { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /growth      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /planos      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /termos      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /privacidade { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /recursos    { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /faq         { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /painel      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /instagram/  { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /post/       { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /posts/      { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /templates/  { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /notifications/ { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /gdrive/     { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /csv-import  { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /gdrive-import { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /watermark   { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location /whitelabel  { proxy_pass http://127.0.0.1:8095; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 60s;
    }
}
