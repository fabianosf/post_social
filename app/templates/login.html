{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="logo-big">Postay</div>
    <div class="card">
        <h2>Entrar</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Email</label>
            <input type="email" name="email" required placeholder="seu@email.com">
            <label>Senha</label>
            <input type="password" name="password" required placeholder="••••••">
            <button type="submit" class="btn" style="width:100%; margin-top:0.5rem;">Entrar</button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:#888; font-size:0.9rem;">
            Não tem conta? <a href="{{ url_for('auth.register') }}">Cadastre-se</a>
        </p>
    </div>
</div>
{% endblock %}
