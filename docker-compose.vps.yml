services:
  postgres:
    image: postgres:16-alpine
    container_name: postay-postgres
    restart: always
    environment:
      POSTGRES_DB: postay
      POSTGRES_USER: postay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postay -d postay"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: postay-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: postay-web
    restart: always
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 --preload -c /app/gunicorn.conf.py run:app
    ports:
      - "127.0.0.1:8095:5000"
    env_file: .env
    environment:
      - NEXTJS_ORIGIN=https://postay.com.br
    volumes:
      - ./app:/app/app
      - ./modules:/app/modules
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
      - ./logs:/app/logs
      - ./gunicorn.conf.py:/app/gunicorn.conf.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: postay-nextjs
    restart: always
    ports:
      - "3001:3000"
    environment:
      - FLASK_URL=http://web:5000
      - NEXT_PUBLIC_APP_URL=https://postay.com.br
      - NODE_ENV=production
      - NEXT_PUBLIC_META_PIXEL_ID=${META_PIXEL_ID}
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build: .
    container_name: postay-worker
    restart: always
    command: python worker.py --daemon --interval=300
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./modules:/app/modules
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /app/logs/worker_heartbeat.txt && [ $(($(date +%s) - $(date +%s -r /app/logs/worker_heartbeat.txt))) -lt 900 ]"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_worker:
    build: .
    container_name: postay-celery
    restart: always
    command: celery -A celery_app worker --loglevel=info -Q postay.posts,postay.maintenance -c 2
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./modules:/app/modules
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery_beat:
    build: .
    container_name: postay-beat
    restart: always
    command: celery -A celery_app beat --loglevel=info -s /app/data/celerybeat-schedule
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./modules:/app/modules
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build: .
    container_name: postay-flower
    restart: always
    command: celery -A celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASS}
    ports:
      - "127.0.0.1:5555:5555"
    env_file: .env
    depends_on:
      - redis

  backup:
    image: postgres:16-alpine
    container_name: postay-backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: postay
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postay
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "while true; do
        pg_dump -h postgres -U postay -d postay | gzip > /backups/postay_$$(date +%Y%m%d_%H%M).sql.gz;
        if [ -f /data/postsocial.db ]; then cp /data/postsocial.db /backups/sqlite_$$(date +%Y%m%d_%H%M).db; fi;
        find /backups -name 'postay_*.sql.gz' -mtime +7 -delete;
        find /backups -name 'sqlite_*.db' -mtime +7 -delete;
        sleep 86400;
      done"

volumes:
  postgres_data:
  redis_data:
